<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="_vbv4CaZJyQaKZH_WDlSGp5OBt7bcrQJDMi1eCbsCvA" />
    <title>{% block title %}{{ site_name|default:"XU-Portfolio" }}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
  </head>
  <body>
    <header class="container header">
      <div class="brand">{{ site_name|default:"XU-Portfolio" }}</div>
      <nav class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'stocks_page' %}">Stocks</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="container footer">
      <small>© {{ site_name|default:"XU-Portfolio" }}</small>
    </footer>
  </body>
</html>
